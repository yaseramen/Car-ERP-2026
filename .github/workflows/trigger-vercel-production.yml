# بعد كل push إلى main: يستدعي رابط «Deploy Hook» من Vercel ليبدأ نشر الإنتاج
# (بديل موثوق عندما يتعطل webhook الافتراضي بين GitHub وVercel)
#
# إعداد لمرة واحدة (من المتصفح):
# 1) Vercel → المشروع car-erp-2026 → Settings → Git → Deploy Hooks → Add → Branch: main → أنشئ وانسخ الرابط
# 2) GitHub → المستودع → Settings → Secrets and variables → Actions → New repository secret
#    الاسم: VERCEL_DEPLOY_HOOK_URL   القيمة: الرابط الذي نسخته

name: Trigger Vercel Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: استدعاء Deploy Hook (نشر الإنتاج)
        env:
          HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "::warning::لم يُضبط VERCEL_DEPLOY_HOOK_URL — أضفه في GitHub → Secrets → Actions (راجع تعليقات الملف)"
            exit 0
          fi
          curl -sS -f -X POST "$HOOK_URL" -w "\nHTTP %{http_code}\n"
