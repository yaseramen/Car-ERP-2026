name: E2E (Playwright)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - run: npx playwright install chromium --with-deps

      # يمرّ دائماً بدون أسرار (واجهة تسجيل الدخول + فشل متوقع).
      # لاختبار دخول حقيقي: أضف في Repo → Settings → Secrets → Actions:
      #   TURSO_DATABASE_URL, TURSO_AUTH_TOKEN, E2E_LOGIN_EMAIL, E2E_LOGIN_PASSWORD
      - run: npm run test:e2e
        env:
          CI: true
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          E2E_LOGIN_EMAIL: ${{ secrets.E2E_LOGIN_EMAIL }}
          E2E_LOGIN_PASSWORD: ${{ secrets.E2E_LOGIN_PASSWORD }}

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
