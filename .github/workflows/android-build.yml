# بناء حزمة Android (TWA) باستخدام Bubblewrap في السحابة — لا حاجة لـ Android SDK على جهازك.
#
# أسرار GitHub (Settings → Secrets and variables → Actions):
#   KEYSTORE_BASE64      محتوى ملف android.keystore بصيغة base64 (انظر android-twa/README.txt)
#   KEYSTORE_PASSWORD    كلمة مرور الـ keystore
#   KEY_PASSWORD         كلمة مرور المفتاح (غالباً نفس KEYSTORE_PASSWORD)
#
# بعد أول build ناجح: انسخ من سجل الـ workflow قيم ANDROID_TWA_* وضعها في Vercel
# ثم أعد نشر الموقع حتى يعمل ملف /.well-known/assetlinks.json (وضع TWA احترافي بدون شريط عنوان).

name: Android TWA (Bubblewrap AAB)

on:
  workflow_dispatch:
    inputs:
      package_id:
        description: "Android applicationId (لاتيني، ثابت لـ Play)"
        required: false
        default: "com.aiverce.carerp"
      skip_pwa_validation:
        description: "تخطي تحقق جودة PWA (إن فشل التحقق من السيرفر)"
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TWA_DIR: android-twa
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java (keytool — بصمة SHA-256 لـ Digital Asset Links)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Check secrets
        run: |
          test -n "${{ secrets.KEYSTORE_BASE64 }}" || { echo "::error::أضف السر KEYSTORE_BASE64"; exit 1; }
          test -n "${{ secrets.KEYSTORE_PASSWORD }}" || { echo "::error::أضف السر KEYSTORE_PASSWORD"; exit 1; }
          test -n "${{ secrets.KEY_PASSWORD }}" || { echo "::error::أضف السر KEY_PASSWORD"; exit 1; }

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$TWA_DIR/android.keystore"
          test -s "$TWA_DIR/android.keystore" || { echo "::error::فك KEYSTORE_BASE64 فشل"; exit 1; }

      - name: استخراج بصمة التوقيع SHA-256 (لـ Vercel وملف assetlinks)
        env:
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          set -e
          KS="$TWA_DIR/android.keystore"
          ALIAS=$(jq -r '.signingKey.alias // "android"' "$TWA_DIR/twa-manifest.json")
          PKG=$(jq -r .packageId "$TWA_DIR/twa-manifest.json")
          HOST=$(jq -r .host "$TWA_DIR/twa-manifest.json")
          if ! keytool -list -alias "$ALIAS" -keystore "$KS" -storepass "$KEYSTORE_PASS" -noprompt >/dev/null 2>&1; then
            echo "::warning::الاسم المستعار «$ALIAS» غير موجود في الـ keystore أو كلمة المرور غير صحيحة."
            echo "المفاتيح المتاحة في الملف:"
            keytool -list -keystore "$KS" -storepass "$KEYSTORE_PASS" -noprompt || true
            exit 0
          fi
          FP_LINE=$(keytool -list -v -keystore "$KS" -alias "$ALIAS" -storepass "$KEYSTORE_PASS" -noprompt 2>/dev/null | grep -i "SHA256:" | head -1 || true)
          FP=$(echo "$FP_LINE" | sed -n 's/.*SHA256:[[:space:]]*//p' | tr -d '\r' | head -c 200)
          if [ -z "$FP" ]; then
            echo "::warning::تعذر قراءة SHA256 من keytool."
            exit 0
          fi
          echo ""
          echo "══════════════════════════════════════════════════════════════"
          echo " TWA احترافي — متغيرات Vercel (Production)"
          echo "══════════════════════════════════════════════════════════════"
          echo " انسخ إلى Vercel → Project → Settings → Environment Variables:"
          echo ""
          echo "   ANDROID_TWA_PACKAGE_NAME=${PKG}"
          echo "   ANDROID_TWA_SHA256_FINGERPRINTS=${FP}"
          echo ""
          echo " ثم أعد نشر الموقع (Redeploy). تحقق من:"
          echo "   https://${HOST}/.well-known/assetlinks.json"
          echo "══════════════════════════════════════════════════════════════"
          echo "::notice::أضف في Vercel: ANDROID_TWA_PACKAGE_NAME=$PKG و ANDROID_TWA_SHA256_FINGERPRINTS=$FP"

      - name: Apply packageId from workflow input
        if: ${{ inputs.package_id != '' }}
        run: |
          jq --arg p "${{ inputs.package_id }}" '.packageId = $p' "$TWA_DIR/twa-manifest.json" > /tmp/twa.json && mv /tmp/twa.json "$TWA_DIR/twa-manifest.json"
          echo "packageId=$(jq -r .packageId "$TWA_DIR/twa-manifest.json")"

      # Gradle يطلب build-tools ويحتاج قبول تراخيص Google؛ في CI لا يوجد طرفية تفاعلية فيقبلها sdkmanager مسبقاً.
      - name: Bubblewrap update + build (Docker)
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -e
          SKIP_FLAG=""
          if [ "${{ inputs.skip_pwa_validation }}" = "true" ]; then
            SKIP_FLAG="--skipPwaValidation"
          fi
          docker run --rm \
            --entrypoint /bin/bash \
            -v "${{ github.workspace }}:/workspace" \
            -w "/workspace/${TWA_DIR}" \
            -e BUBBLEWRAP_KEYSTORE_PASSWORD \
            -e BUBBLEWRAP_KEY_PASSWORD \
            -e BW_SKIP_FLAG="$SKIP_FLAG" \
            ghcr.io/googlechromelabs/bubblewrap:latest \
            -c 'set -e
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH="$JAVA_HOME/bin:$PATH"
          ANDROID_HOME="/root/.bubblewrap/android_sdk"
          unset ANDROID_SDK_ROOT
          export ANDROID_HOME
          bubblewrap update --manifest twa-manifest.json --skipVersionUpgrade
          unset ANDROID_SDK_ROOT
          export ANDROID_HOME
          if [ -d "$ANDROID_HOME" ]; then
            SDKM=$(find "$ANDROID_HOME" -path "*/cmdline-tools/*/bin/sdkmanager" -type f 2>/dev/null | sort | head -1)
            if [ -z "$SDKM" ]; then SDKM=$(find "$ANDROID_HOME" -name sdkmanager -type f 2>/dev/null | sort | head -1); fi
            if [ -n "$SDKM" ]; then
              chmod +x "$SDKM" 2>/dev/null || true
              echo "sdkmanager=$SDKM ANDROID_HOME=$ANDROID_HOME"
              mkdir -p "$ANDROID_HOME/licenses"
              echo "24333f8a63b6825ea9c5514f83c2829b04d171ee72b7452b67716ee344a66893" > "$ANDROID_HOME/licenses/android-sdk-license"
              echo "84831b9409646a918e30573bab4c9c91346d8abd" > "$ANDROID_HOME/licenses/android-sdk-preview-license"
              yes | "$SDKM" --sdk_root="$ANDROID_HOME" --licenses || true
              yes | "$SDKM" --sdk_root="$ANDROID_HOME" "platform-tools" "platforms;android-35" "build-tools;35.0.0" "build-tools;34.0.0" || true
            else
              echo "::warning::لم يُعثر على sdkmanager تحت $ANDROID_HOME"
            fi
          else
            echo "::warning::لم يُوجد $ANDROID_HOME بعد update — قد يفشل build"
          fi
          unset ANDROID_SDK_ROOT
          export ANDROID_HOME
          bubblewrap build --manifest twa-manifest.json $BW_SKIP_FLAG'

      # Docker يعمل كـ root فيُنشئ app/build بصلاحيات root — runner لا يقرأها (EACCES عند رفع الـ artifact)
      - name: Fix permissions after Docker (chown to runner)
        run: sudo chown -R "$(id -u):$(id -g)" "$TWA_DIR"

      - name: List outputs
        run: |
          find "$TWA_DIR" -type f \( -name "*.aab" -o -name "*.apk" \) -print 2>/dev/null | head -50 || true
          ls -la "$TWA_DIR" || true

      # الملفات النهائية تحت outputs فقط — تجنّب intermediates (ملفات وسيطة وليست حزمة Play)
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-bundle
          path: ${{ env.TWA_DIR }}/app/build/outputs/**/*.aab
          if-no-files-found: warn

      - name: Upload signed APK (if present)
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: ${{ env.TWA_DIR }}/app/build/outputs/**/*.apk
          if-no-files-found: ignore
